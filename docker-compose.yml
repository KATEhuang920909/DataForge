services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: dataforge-api
    user: root
    environment:
      - DATABASE_URL=sqlite:///./data/dataforge.db
      - AUTH_SECRET=dataforge-secret-key
      - CORS_ORIGINS=["http://localhost:5173", "http://127.0.0.1:5173"]
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Bocsoft2025@Advanced
    volumes:
      - dataforge-data:/app/data
    ports:
      - 8001:8000
# 添加管理员权限配置
    privileged: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: dataforge-frontend
    user: root
    privileged: true
    ports:
      - 5173:80
    depends_on:
      - api

volumes:
  dataforge-data:
    driver: local
