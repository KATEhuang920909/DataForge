services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataforge-api
    environment:
      - DATABASE_URL=sqlite:///./data/dataforge.db
      - AUTH_SECRET=dataforge-secret-key
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - dataforge-data:/app/data
    ports:
      - 8000:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataforge-frontend
    ports:
      - 5173:80
    depends_on:
      - api

volumes:
  dataforge-data:
    driver: local
